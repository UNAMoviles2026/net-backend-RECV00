openapi: 3.0.3
info:
  title: Classrooms API
  version: 1.0.0

paths:
  /api/classrooms:
    get:
      summary: List classrooms
      responses:
        '200':
          description: Classrooms returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassroomResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassroomRequest'
      responses:
        '201':
          description: Classroom created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassroomResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/classrooms/{id}:
    get:
      summary: Get classroom by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Classroom found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassroomResponse'
        '404':
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ClassroomResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        capacity:
          type: integer
        location:
          type: string

    CreateClassroomRequest:
      type: object
      required:
        - name
        - capacity
        - location
      properties:
        name:
          type: string
          maxLength: 100
        capacity:
          type: integer
          minimum: 1
        location:
          type: string
          maxLength: 150

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string