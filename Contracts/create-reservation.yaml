openapi: 3.0.3
info:
  title: Create Reservation API
  version: 1.0.0

paths:
  /api/reservations:
    post:
      summary: Create a reservation
      description: Validates payload (422), references (400), and classroom availability (409).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '200':
          description: Reservation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          description: Invalid business rule (e.g. user or classroom reference not found)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed (data annotations or cross-field rules)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
        '409':
          description: Time conflict with another reservation in the same classroom and date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateReservationRequest:
      type: object
      required:
        - userId
        - classroomId
        - date
        - startTime
        - endTime
      properties:
        userId:
          type: string
          format: uuid
          example: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
        classroomId:
          type: string
          format: uuid
          example: "11111111-1111-1111-1111-111111111111"
        date:
          type: string
          format: date
          example: "2026-03-21"
        startTime:
          type: string
          format: time
          example: "08:00:00"
        endTime:
          type: string
          format: time
          example: "10:00:00"

    ReservationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        classroomId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationProblemDetails:
      type: object
      description: ASP.NET Core validation problem details (RFC 7807-style subset)
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string